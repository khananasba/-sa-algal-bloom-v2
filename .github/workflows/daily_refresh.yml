name: Daily Data Refresh

on:
  schedule:
    - cron: '0 2 * * *'   # 2:00 AM UTC = 12:30 PM ACST (Adelaide)
  workflow_dispatch:        # allows manual trigger from GitHub Actions tab

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Wake Render service (handles cold start)
        run: |
          echo "Pinging health endpoint to wake service..."
          for i in 1 2 3 4 5; do
            echo "Attempt $i of 5..."
            curl -f --max-time 30 https://sa-algal-bloom.onrender.com/api/health && break
            echo "Sleeping 30s before next attempt..."
            sleep 30
          done

      - name: Trigger data refresh
        run: |
          echo "POSTing to /api/refresh..."
          HTTP_CODE=$(curl -s -o /tmp/refresh_response.txt -w "%{http_code}" \
            --max-time 600 \
            -X POST \
            -H "X-Refresh-Key: ${{ secrets.REFRESH_KEY }}" \
            -H "Content-Type: application/json" \
            https://sa-algal-bloom.onrender.com/api/refresh)

          RESPONSE=$(cat /tmp/refresh_response.txt)

          echo "--- HTTP status code: $HTTP_CODE ---"
          echo "--- Raw response (first 1000 chars) ---"
          echo "$RESPONSE" | head -c 1000
          echo ""
          echo "--- End response ---"

          # Check if response looks like HTML (Render crash page)
          if echo "$RESPONSE" | grep -qi "<!doctype\|<html"; then
            echo "ERROR: Got HTML response instead of JSON — Render service likely crashed on startup"
            echo "Check Render logs at: https://dashboard.render.com"
            exit 1
          fi

          # Check HTTP code
          if [ "$HTTP_CODE" != "200" ]; then
            echo "ERROR: HTTP $HTTP_CODE — expected 200"
            exit 1
          fi

          # Pretty-print JSON if jq is available
          echo "$RESPONSE" | jq '.' 2>/dev/null || true

          # Fail if API returned error status
          STATUS=$(echo "$RESPONSE" | jq -r '.status' 2>/dev/null)
          if [ "$STATUS" = "error" ]; then
            echo "ERROR: Refresh returned error status"
            exit 1
          fi

          echo "Refresh completed successfully."
