services:
  - type: web
    name: sa-algal-bloom-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        sync: false          # paste the Supabase connection URL in the Render dashboard
      - key: REFRESH_KEY
        sync: false          # set a strong random value, e.g.: openssl rand -hex 32
      - key: OPENAI_API_KEY
        sync: false          # paste your OpenAI API key in the Render dashboard
      - key: API_BASE_URL
        value: https://sa-algal-bloom-v2.onrender.com/api
      - key: PYTHON_VERSION
        value: 3.11.0
