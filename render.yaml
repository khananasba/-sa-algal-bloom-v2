services:
  - type: web
    name: sa-algal-bloom-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        sync: false          # you paste the Supabase URL in the Render dashboard
      - key: PYTHON_VERSION
        value: 3.11.0
